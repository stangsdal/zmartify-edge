services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hvac-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  hvac-edge-api:
    build:
      context: ./hvac-edge-api
      dockerfile: Dockerfile
    image: hvac-edge-api:local
    container_name: hvac-edge-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - hvac-edge-data:/data
      - ./mosquitto/config:/mosquitto/config
      - ./admin-ui/dist:/admin-ui/dist:ro
      - ./hvac-admin/dist:/hvac-admin/dist:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - HVAC_EDGE_DB_PATH=/data/hvac-edge.sqlite
      - HVAC_EDGE_APPLY_MQTT_COMMANDS=1
      - HVAC_EDGE_MQTT_ACL_FILE=/mosquitto/config/acl
      - HVAC_EDGE_MQTT_PASSWD_FILE=/mosquitto/config/passwd
      - HVAC_EDGE_MOSQUITTO_PASSWD_BIN=mosquitto_passwd
      - HVAC_EDGE_MQTT_RELOAD_CMD=docker kill -s HUP hvac-mosquitto
      - HVAC_EDGE_MQTT_RESTART_CMD=docker restart hvac-mosquitto
      - HVAC_EDGE_DRY_RUN_ACL_WRITE=0
      - HVAC_EDGE_FORWARD_SETPOINT_TO_MQTT=1
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me-admin-token}
    depends_on:
      - mosquitto

volumes:
  hvac-edge-data:

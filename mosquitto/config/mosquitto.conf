persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

listener 1883
protocol mqtt

listener 8883
protocol mqtt
certfile /letsencrypt/live/pilot.zmartify.dk/fullchain.pem
keyfile /letsencrypt/live/pilot.zmartify.dk/privkey.pem
tls_version tlsv1.2

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hvac-mosquitto
    restart: unless-stopped
    user: root
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./acme:/letsencrypt:ro

  zmartify-edge-api:
    build:
      context: ./zmartify-edge-api
      dockerfile: Dockerfile
    image: zmartify-edge-api:local
    container_name: zmartify-edge-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "443:8443"
    volumes:
      - hvac-edge-data:/data
      - ./mosquitto/config:/mosquitto/config
      - ./admin-ui/dist:/admin-ui/dist:ro
      - ./zmartify-admin/dist:/zmartify-admin/dist:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./acme:/letsencrypt:ro
    command:
      - sh
      - -c
      - >-
        exec uvicorn main:app --host 0.0.0.0 --port 8443
        --ssl-certfile /letsencrypt/live/pilot.zmartify.dk/fullchain.pem
        --ssl-keyfile /letsencrypt/live/pilot.zmartify.dk/privkey.pem
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ZMART_EDGE_DB_PATH=/data/hvac-edge.sqlite
      - ZMART_EDGE_APPLY_MQTT_COMMANDS=1
      - ZMART_EDGE_MQTT_ACL_FILE=/mosquitto/config/acl
      - ZMART_EDGE_MQTT_PASSWD_FILE=/mosquitto/config/passwd
      - ZMART_EDGE_MOSQUITTO_PASSWD_BIN=mosquitto_passwd
      - ZMART_EDGE_MQTT_RELOAD_CMD=docker kill -s HUP hvac-mosquitto
      - ZMART_EDGE_MQTT_RESTART_CMD=docker restart hvac-mosquitto
      - ZMART_EDGE_DRY_RUN_ACL_WRITE=0
      - ZMART_EDGE_FORWARD_SETPOINT_TO_MQTT=1
      - ZMART_EDGE_PUBLIC_API_BASE=https://pilot.zmartify.dk
      - ZMART_EDGE_PUBLIC_MQTT_URI=mqtts://pilot.zmartify.dk:8883
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me-admin-token}
    depends_on:
      - mosquitto

  zmartify-edge-api-http:
    build:
      context: ./zmartify-edge-api
      dockerfile: Dockerfile
    image: zmartify-edge-api:local
    container_name: zmartify-edge-api-http
    restart: unless-stopped
    working_dir: /app
    ports:
      - "80:8080"
    volumes:
      - hvac-edge-data:/data
      - ./mosquitto/config:/mosquitto/config
      - ./admin-ui/dist:/admin-ui/dist:ro
      - ./zmartify-admin/dist:/zmartify-admin/dist:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ZMART_EDGE_DB_PATH=/data/hvac-edge.sqlite
      - ZMART_EDGE_APPLY_MQTT_COMMANDS=1
      - ZMART_EDGE_MQTT_ACL_FILE=/mosquitto/config/acl
      - ZMART_EDGE_MQTT_PASSWD_FILE=/mosquitto/config/passwd
      - ZMART_EDGE_MOSQUITTO_PASSWD_BIN=mosquitto_passwd
      - ZMART_EDGE_MQTT_RELOAD_CMD=docker kill -s HUP hvac-mosquitto
      - ZMART_EDGE_MQTT_RESTART_CMD=docker restart hvac-mosquitto
      - ZMART_EDGE_DRY_RUN_ACL_WRITE=0
      - ZMART_EDGE_FORWARD_SETPOINT_TO_MQTT=1
      - ZMART_EDGE_PUBLIC_API_BASE=https://pilot.zmartify.dk
      - ZMART_EDGE_PUBLIC_MQTT_URI=mqtts://pilot.zmartify.dk:8883
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me-admin-token}
    depends_on:
      - mosquitto

volumes:
  hvac-edge-data:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hvac-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  hvac-edge-api:
    image: python:3.12-slim
    container_name: hvac-edge-api
    restart: unless-stopped
    working_dir: /app
    command: sh /app/entrypoint.sh
    ports:
      - "8080:8080"
    volumes:
      - ./hvac-edge-api:/app
      - hvac-edge-data:/data
      - ./mosquitto/config:/mosquitto/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - HVAC_EDGE_DB_PATH=/data/hvac-edge.sqlite
      - HVAC_EDGE_APPLY_MQTT_COMMANDS=1
      - HVAC_EDGE_MQTT_ACL_FILE=/mosquitto/config/acl
      - HVAC_EDGE_MQTT_PASSWD_FILE=/mosquitto/config/passwd
      - HVAC_EDGE_MOSQUITTO_PASSWD_BIN=mosquitto_passwd
      - HVAC_EDGE_MQTT_RELOAD_CMD=docker kill -s HUP hvac-mosquitto
      - HVAC_EDGE_MQTT_RESTART_CMD=docker restart hvac-mosquitto
      - HVAC_EDGE_DRY_RUN_ACL_WRITE=0
    depends_on:
      - mosquitto

volumes:
  hvac-edge-data:
